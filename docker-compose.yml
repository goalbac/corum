version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: association_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: association_db
      POSTGRES_USER: association_user
      POSTGRES_PASSWORD: association_pass
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - association_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U association_user -d association_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: association_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      TZ: Asia/Seoul
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - association_net
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: association_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      TZ: Asia/Seoul
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio_data:/data
    networks:
      - association_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    container_name: association_minio_init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - association_net
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb --ignore-existing local/association-files;
      mc anonymous set none local/association-files;
      echo 'Bucket created';
      exit 0;
      "

volumes:
  postgres_data:
  pgadmin_data:
  minio_data:

networks:
  association_net:
    driver: bridge
