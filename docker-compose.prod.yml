services:

  postgres:
    image: postgres:16
    container_name: association_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-association_db}
      POSTGRES_USER: ${DB_USER:-association_user}
      POSTGRES_PASSWORD: ${DB_PASS:?DB_PASS 환경변수가 설정되지 않았습니다. .env.prod를 확인하세요.}
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - association_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-association_user} -d ${DB_NAME:-association_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: association_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?S3_ACCESS_KEY 환경변수가 설정되지 않았습니다. .env.prod를 확인하세요.}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY 환경변수가 설정되지 않았습니다. .env.prod를 확인하세요.}
      TZ: Asia/Seoul
    ports:
      - "9001:9001"   # MinIO 콘솔 (필요 시 방화벽으로 제한)
    volumes:
      - minio_data:/data
    networks:
      - association_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    container_name: association_minio_init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - association_net
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:?S3_ACCESS_KEY 환경변수가 설정되지 않았습니다. .env.prod를 확인하세요.} ${S3_SECRET_KEY:?S3_SECRET_KEY 환경변수가 설정되지 않았습니다. .env.prod를 확인하세요.};
      mc mb --ignore-existing local/association-files;
      mc anonymous set none local/association-files;
      echo 'Bucket ready';
      exit 0;
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: association_backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_NAME: ${DB_NAME:-association_db}
      DB_USER: ${DB_USER:-association_user}
      DB_PASS: ${DB_PASS:?DB_PASS 환경변수가 설정되지 않았습니다. .env.prod를 확인하세요.}
      JWT_SECRET: ${JWT_SECRET}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY 환경변수가 설정되지 않았습니다. .env.prod를 확인하세요.}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY 환경변수가 설정되지 않았습니다. .env.prod를 확인하세요.}
      S3_BUCKET: ${S3_BUCKET:-association-files}
      S3_REGION: ${S3_REGION:-us-east-1}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      TZ: Asia/Seoul
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - association_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: association_frontend
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - association_net

volumes:
  postgres_data:
  minio_data:

networks:
  association_net:
    driver: bridge
