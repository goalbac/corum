spring:
  profiles:
    active: local

  application:
    name: corum-backend

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

jwt:
  secret: ${JWT_SECRET:corum-secret-key-must-be-at-least-32-characters-long}
  access-token-expiry-ms: 1800000
  refresh-token-expiry-ms: 604800000
  login-fail-limit: 5

storage:
  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin123}
    bucket: ${S3_BUCKET:association-files}
    region: ${S3_REGION:us-east-1}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

logging:
  level:
    com.corum: DEBUG
    org.springframework.security: INFO
    org.eclipse.angus.mail: DEBUG
