spring:
  profiles:
    active: local

  application:
    name: corum-backend

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry-ms: 1800000
  refresh-token-expiry-ms: 604800000
  login-fail-limit: 5

storage:
  s3:
    endpoint: ${S3_ENDPOINT}
    access-key: ${S3_ACCESS_KEY}
    secret-key: ${S3_SECRET_KEY}
    bucket: ${S3_BUCKET:association-files}
    region: ${S3_REGION:us-east-1}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  cors:
    # 콤마로 구분된 추가 허용 오리진(예: Cloudflare Pages 도메인). 로컬 개발용 오리진은
    # WebMvcConfig에 기본 포함되어 있어 여기서 따로 넣지 않아도 된다.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

logging:
  level:
    com.corum: DEBUG
    org.springframework.security: INFO
    org.eclipse.angus.mail: DEBUG
